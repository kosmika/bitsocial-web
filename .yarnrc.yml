nodeLinker: node-modules
defaultSemverRangePrefix: ""
checksumBehavior: throw
npmMinimalAgeGate: 3d
packageExtensions:
  "@pkcprotocol/pkc-js@0.0.47":
    dependencies:
      "@libp2p/webtransport": "6.0.0"
# Allow vite upgrades before the npmMinimalAgeGate window (pinned in package.json).
npmPreapprovedPackages:
  - vite
  - react-doctor
  - oxlint-plugin-react-doctor
  - deslop-js
  - knip
  # Portless 0.11 is needed for the HTTPS .localhost flow without a visible :1355 port.
  - portless
  # The blog page is itself a Bitsocial client and tracks 5chan's pkc-js / hooks
  # versions closely so the same protocol fixes land here without a 3-day lag.
  - "@bitsocial/bitsocial-react-hooks"
  - "@pkcprotocol/pkc-js"
  # CVE-2026-48038 fix (17.13.4) is within npmMinimalAgeGate window.
  - joi
