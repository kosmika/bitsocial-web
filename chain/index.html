<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b1018" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png" />
    <link rel="icon" type="image/png" sizes="576x576" href="/favicon-576.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Preload the locally hosted Exo display font -->
    <link rel="preload" href="/fonts/exo/latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/exo/latin-ext.woff2" as="font" type="font/woff2" crossorigin />
    <link
      rel="preload"
      href="/fonts/exo/vietnamese.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <meta
      name="description"
      content="BSO is the token of Bitsocial Chain, the Ethereum L2 appchain built to fix crypto: sovereign communities with their own tokens, programmable revenue, and one sound money underneath it all."
    />

    <!-- Open Graph / social. Set og:url, canonical and og:image once a domain + share image exist. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BSO / Bitsocial Chain" />
    <meta property="og:title" content="BSO — The missing layer of crypto" />
    <meta property="og:description" content="The token built to fix all of crypto." />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="BSO — The missing layer of crypto" />
    <meta name="twitter:description" content="The token built to fix all of crypto." />

    <script>
      (() => {
        try {
          const params = new URLSearchParams(window.location.search);
          const queryTheme = params.get("theme");
          const storedTheme = window.localStorage.getItem("bso-theme");
          const theme =
            queryTheme === "light" || queryTheme === "dark"
              ? queryTheme
              : storedTheme === "light" || storedTheme === "dark"
                ? storedTheme
                : window.matchMedia("(prefers-color-scheme: light)").matches
                  ? "light"
                  : "dark";
          document.documentElement.classList.toggle("dark", theme === "dark");
          if (queryTheme === "light" || queryTheme === "dark") {
            window.localStorage.setItem("bso-theme", queryTheme);
          }
        } catch {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <style>
      .nojs-block,
      .nojs-flex,
      .nojs-grid,
      .nojs-inline,
      .nojs-inline-flex {
        display: none !important;
      }
    </style>
    <noscript>
      <style>
        .js-only {
          display: none !important;
        }
        .nojs-block {
          display: block !important;
        }
        .nojs-flex {
          display: flex !important;
        }
        .nojs-grid {
          display: grid !important;
        }
        .nojs-inline {
          display: inline !important;
        }
        .nojs-inline-flex {
          display: inline-flex !important;
        }
        #root [style*="opacity:0;"],
        #root [style*="opacity: 0;"],
        #root [style$="opacity:0"],
        #root [style$="opacity: 0"] {
          opacity: 1 !important;
        }
        #root [style*="transform:translate"],
        #root [style*="transform:scale"] {
          transform: none !important;
        }
        #root .topbar-frosted {
          overflow: visible !important;
        }
        #root .topbar-desktop-nav {
          justify-content: flex-end;
          margin-left: auto;
          min-width: 0;
          width: max-content;
        }
        #root .topbar-links,
        #root .topbar-controls,
        #root .topbar-nojs-controls {
          flex-shrink: 0;
        }
        #root .topbar-nojs-controls {
          margin-left: auto;
        }
        #root .nojs-mobile-menu {
          display: none !important;
          margin-left: auto;
          position: relative;
          flex: none;
        }
        #root .nojs-mobile-panel {
          display: none !important;
        }
        #root .nojs-language-menu {
          position: relative;
          flex-shrink: 0;
        }
        #root .nojs-language-summary {
          display: inline-flex;
          align-items: center;
        }
        #root .nojs-language-panel {
          display: none !important;
          position: absolute;
          top: calc(100% + 0.75rem);
          right: 0;
          z-index: 60;
          width: min(28rem, calc(100vw - 2rem));
          min-width: 18rem;
        }
        #root .nojs-language-menu[open] .nojs-language-summary {
          background: hsl(var(--border) / 0.7);
          color: hsl(var(--foreground));
        }
        #root .nojs-language-menu[open] .nojs-language-panel {
          display: block !important;
        }
        @media (max-width: 1200px) {
          #root .topbar-desktop-nav {
            display: none !important;
          }
          #root .nojs-mobile-menu {
            display: block !important;
            margin-left: auto;
          }
          #root .nojs-mobile-menu[open] .nojs-mobile-panel {
            display: block !important;
            position: absolute;
            top: calc(100% + 0.5rem);
            right: 0;
            z-index: 60;
            width: min(24rem, calc(100vw - 2rem));
            max-height: min(70vh, 32rem);
            overflow-y: auto;
            border-radius: 2rem;
            border: 1px solid hsl(var(--border) / 0.34);
            background: var(--frosted-surface-fill-mobile);
            -webkit-backdrop-filter: blur(18px) saturate(1.06);
            backdrop-filter: blur(18px) saturate(1.06);
            box-shadow: 0 22px 52px rgba(15, 23, 42, 0.14);
          }
          #root .nojs-mobile-panel .glass-card {
            background: hsl(var(--background) / 0.8) !important;
            box-shadow: none;
          }
        }
        @media (max-width: 768px) {
          #root .nojs-language-panel {
            min-width: 16rem;
          }
          #root .nojs-mobile-menu[open] .nojs-mobile-panel {
            width: min(22rem, calc(100vw - 2rem));
          }
        }
        .dark #root .nojs-mobile-menu[open] .nojs-mobile-panel {
          background: var(--frosted-surface-fill-mobile);
          box-shadow: 0 22px 52px rgba(0, 0, 0, 0.34);
        }
        .dark #root .nojs-mobile-panel .glass-card {
          background: hsl(var(--background) / 0.74) !important;
        }
      </style>
    </noscript>
    <title>BSO - The Missing Layer of Crypto</title>
    <!-- React Grab: hold Cmd/Ctrl + C and click any element to hand it to an AI coding agent (dev only) -->
    <script type="module">
      if (import.meta.env.DEV) {
        import("react-grab");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
